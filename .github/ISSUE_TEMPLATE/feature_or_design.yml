name: Feature or design proposal
description: Propose new behavior, configuration, architecture, or follow-up work.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for feature requests, design proposals, and architectural follow-up. Be explicit about the problem and tradeoffs.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator, maintainer, or user problem should this solve?
      placeholder: LCM currently exposes seven tools in every session, which can exceed tool-count-sensitive backend limits.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: User or operator impact
      description: Who is affected and how bad is it?
      placeholder: Claude proxy sessions fail when total tool count crosses the backend limit, even though the LCM engine itself can keep running.
    validations:
      required: true

  - type: textarea
    id: direction
    attributes:
      label: Proposed direction
      description: Describe the preferred implementation or behavior change.
      placeholder: Add an lcm.tool_mode config with individual, dispatcher, minimal, and none modes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
      description: List other approaches considered and why they are less preferred.
      placeholder: A per-tool exposed_tools list is simpler, but it does not reduce schema count as much as dispatcher mode.
    validations:
      required: true

  - type: textarea
    id: compatibility
    attributes:
      label: Backward compatibility
      description: Explain defaults, migrations, and compatibility risks.
      placeholder: Default to current behavior so existing users keep all seven tools unless they opt in.
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation or evidence
      description: Include prototype notes, tests, logs, measurements, screenshots, or links that justify the change.
      placeholder: |
        - Prototype branch: ...
        - Tool count before: 26
        - Tool count after minimal mode: 21
        - pytest ... -> passes
    validations:
      required: false

  - type: dropdown
    id: implementation-status
    attributes:
      label: Implementation status
      description: How concrete is this proposal?
      options:
        - Idea only
        - Design sketched
        - Prototype exists
        - PR incoming
        - PR already opened
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Anything maintainers should know before deciding direction.
    validations:
      required: false
